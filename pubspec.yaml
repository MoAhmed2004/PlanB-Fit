name: planb_fit
description: AI-powered gym alternative exercise suggester – Build Your Startup in 4 Hours
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # ── State management
  provider: ^6.1.2

  # ── Local storage
  shared_preferences: ^2.3.3

  # ── Networking
  http: ^1.2.2

  # ── Camera / gallery
  image_picker: ^1.1.2

  # ── Typography
  google_fonts: ^6.2.1

  # ── Animations
  flutter_animate: ^4.5.0

  # ── Deep links
  url_launcher: ^6.3.1

  # ── IDs for models
  uuid: ^4.5.1

  # ── Charts (occupancy heatmap)
  fl_chart: ^0.68.0

  # ── Time formatting
  timeago: ^3.6.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.4

flutter:
  assets:
    - assets/images/
  uses-material-design: true

# ── Splash Screen Configuration ──
flutter_native_splash:
  color: "#000000"
  image: assets/images/splash.png
  android_12:
    color: "#000000"
    image: assets/images/splash.png
    icon_background_color: "#000000"

# ── Launcher Icons Configuration ──
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21